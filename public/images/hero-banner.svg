<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" fill="none">
  <defs>
    <!-- Background gradient: deep navy left → slightly lighter right -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070E3A"/>
      <stop offset="100%" stop-color="#112060"/>
    </linearGradient>
    <!-- Right-side radial glow behind appliances -->
    <radialGradient id="sideGlow" cx="72%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#1E55C8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0D1B72" stop-opacity="0"/>
    </radialGradient>
    <!-- Ground plane glow -->
    <linearGradient id="groundGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E55C8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1E55C8" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E55C8" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1600" height="700" fill="url(#bg)"/>
  <rect width="1600" height="700" fill="url(#grid)"/>
  <rect width="1600" height="700" fill="url(#sideGlow)"/>

  <!-- Top accent stripe -->
  <rect width="1600" height="4" fill="#1E55C8" opacity="0.6"/>

  <!-- Left side diagonal accent corner -->
  <polygon points="0,700 0,500 180,700" fill="#1E55C8" opacity="0.05"/>
  <!-- Top-right diagonal accent -->
  <polygon points="1600,0 1350,0 1600,180" fill="#1E55C8" opacity="0.07"/>

  <!-- Left side speed-lines (subtle motion feel) -->
  <rect x="40"  y="190" width="480" height="2"   rx="1" fill="#1E55C8" opacity="0.12"/>
  <rect x="40"  y="212" width="400" height="1.5" rx="0.75" fill="#1E55C8" opacity="0.08"/>
  <rect x="40"  y="232" width="520" height="1"   rx="0.5" fill="#1E55C8" opacity="0.05"/>
  <rect x="40"  y="370" width="460" height="2"   rx="1" fill="#1E55C8" opacity="0.12"/>
  <rect x="40"  y="392" width="380" height="1.5" rx="0.75" fill="#1E55C8" opacity="0.08"/>
  <rect x="40"  y="412" width="500" height="1"   rx="0.5" fill="#1E55C8" opacity="0.05"/>
  <rect x="40"  y="475" width="430" height="1.5" rx="0.75" fill="#1E55C8" opacity="0.07"/>

  <!-- ── GROUND PLANE ── -->
  <rect x="820" y="586" width="740" height="2" rx="1" fill="#1E55C8" opacity="0.45"/>
  <rect x="820" y="588" width="740" height="100" fill="url(#groundGlow)"/>

  <!-- Appliance glow blob -->
  <ellipse cx="1210" cy="490" rx="380" ry="180" fill="#1E55C8" opacity="0.08"/>

  <!-- ═══════════════════════════════════════════════
       REFRIGERATOR — French door, center of illustration
       Base: y=588, center x=1205, size: 175w × 330h
  ════════════════════════════════════════════════════ -->
  <!-- Drop shadow -->
  <ellipse cx="1205" cy="596" rx="92" ry="16" fill="#000" opacity="0.35"/>

  <!-- Body -->
  <rect x="1118" y="258" width="174" height="328" rx="6" fill="#162C6E" stroke="#2B4BB8" stroke-width="1.5"/>

  <!-- Control strip top -->
  <rect x="1118" y="258" width="174" height="24" rx="6" fill="#1E3A8A" stroke="#2B4BB8" stroke-width="1"/>
  <circle cx="1145" cy="270" r="4"  fill="#3B72E8" opacity="0.7"/>
  <circle cx="1158" cy="270" r="3"  fill="#60A5FA" opacity="0.4"/>
  <rect   x="1170" y="264" width="40" height="12" rx="3" fill="#0D1B52" stroke="#2344B5" stroke-width="0.5"/>

  <!-- Left upper door -->
  <rect x="1122" y="284" width="82"  height="198" rx="4" fill="#152B6A" stroke="#2344B5" stroke-width="0.8"/>
  <!-- Left door inner panel highlight -->
  <rect x="1128" y="292" width="70"  height="6"   rx="2" fill="#1E55C8" opacity="0.18"/>
  <!-- Left door handle -->
  <rect x="1197" y="354" width="5"   height="44"  rx="2.5" fill="#3B72E8" opacity="0.85"/>

  <!-- Right upper door -->
  <rect x="1208" y="284" width="80"  height="198" rx="4" fill="#152B6A" stroke="#2344B5" stroke-width="0.8"/>
  <rect x="1214" y="292" width="68"  height="6"   rx="2" fill="#1E55C8" opacity="0.18"/>
  <!-- Right door handle -->
  <rect x="1209" y="354" width="5"   height="44"  rx="2.5" fill="#3B72E8" opacity="0.85"/>

  <!-- Door center gap -->
  <rect x="1203" y="284" width="6"   height="198" fill="#0B163C"/>

  <!-- Thin accent lines on door sides -->
  <rect x="1118" y="295" width="3"   height="180" rx="1" fill="#3B72E8" opacity="0.5"/>
  <rect x="1289" y="295" width="3"   height="180" rx="1" fill="#3B72E8" opacity="0.5"/>

  <!-- Freezer drawer divider -->
  <rect x="1118" y="481" width="174" height="8"   fill="#0B163C"/>

  <!-- Freezer drawer -->
  <rect x="1118" y="489" width="174" height="97"  rx="0" fill="#152B6A" stroke="#2344B5" stroke-width="0.8"/>
  <!-- Freezer handle -->
  <rect x="1158" y="496" width="54"  height="5"   rx="2.5" fill="#3B72E8" opacity="0.75"/>
  <!-- Freezer ice maker vent -->
  <rect x="1135" y="515" width="80"  height="3"   rx="1" fill="#1E3A8A" opacity="0.6"/>
  <rect x="1135" y="522" width="80"  height="3"   rx="1" fill="#1E3A8A" opacity="0.5"/>
  <rect x="1135" y="529" width="80"  height="3"   rx="1" fill="#1E3A8A" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════════
       FRONT-LOAD WASHER — left of fridge
       Base: y=586, center x=988, size: 158w × 172h
  ════════════════════════════════════════════════════ -->
  <ellipse cx="988" cy="595" rx="80"  ry="14" fill="#000" opacity="0.28"/>

  <!-- Body -->
  <rect x="909" y="414" width="158" height="172" rx="7" fill="#162C6E" stroke="#2B4BB8" stroke-width="1.5"/>

  <!-- Control panel strip -->
  <rect x="909" y="414" width="158" height="28"  rx="7" fill="#1E3A8A" stroke="#2344B5" stroke-width="1"/>
  <!-- Knobs -->
  <circle cx="933" cy="428" r="7"   fill="#0D1B52" stroke="#3B72E8" stroke-width="1"/>
  <circle cx="933" cy="428" r="3.5" fill="#3B72E8" opacity="0.65"/>
  <circle cx="952" cy="428" r="4"   fill="#60A5FA" opacity="0.45"/>
  <!-- Display rectangle -->
  <rect   x="964" y="420" width="46" height="16" rx="3" fill="#0D1B52" stroke="#2344B5" stroke-width="0.5"/>
  <rect   x="968" y="424" width="20" height="8"  rx="1" fill="#1E55C8" opacity="0.35"/>

  <!-- Door outer bezel -->
  <circle cx="988" cy="524" r="56"  fill="#0D1B52" stroke="#2B4BB8" stroke-width="2"/>
  <!-- Door glass -->
  <circle cx="988" cy="524" r="50"  fill="#111B58"/>
  <circle cx="988" cy="524" r="43"  fill="#0A1445" stroke="#1E3580" stroke-width="0.8"/>
  <!-- Drum ribs (simplified) -->
  <circle cx="988" cy="524" r="35"  fill="none" stroke="#162C6E" stroke-width="1" stroke-dasharray="8 5"/>
  <!-- Window shine -->
  <ellipse cx="972" cy="510" rx="13" ry="9" fill="#1E55C8" opacity="0.1"/>
  <ellipse cx="970" cy="508" rx="6"  ry="4" fill="#60A5FA" opacity="0.12"/>
  <!-- Door latch -->
  <circle cx="1028" cy="524" r="6"  fill="#1E3A8A" stroke="#3B72E8" stroke-width="1"/>
  <circle cx="1028" cy="524" r="3"  fill="#3B72E8" opacity="0.7"/>

  <!-- Bottom panel -->
  <rect x="909" y="570" width="158" height="16" rx="0" fill="#1A2E72"/>
  <rect x="920" y="574" width="40"  height="9"  rx="2" fill="#0D1B52" stroke="#2344B5" stroke-width="0.5"/>
  <!-- Lint filter door -->
  <rect x="1030" y="574" width="28" height="9"  rx="2" fill="#0D1B52" stroke="#2344B5" stroke-width="0.5"/>

  <!-- ═══════════════════════════════════════════════
       RANGE / OVEN — right of fridge
       Base: y=586, center x=1430, size: 148w × 155h
  ════════════════════════════════════════════════════ -->
  <ellipse cx="1430" cy="594" rx="76"  ry="13" fill="#000" opacity="0.28"/>

  <!-- Body -->
  <rect x="1356" y="431" width="148" height="155" rx="6" fill="#162C6E" stroke="#2B4BB8" stroke-width="1.5"/>

  <!-- Cooktop surface -->
  <rect x="1356" y="431" width="148" height="68"  rx="6" fill="#152B6A" stroke="#2344B5" stroke-width="1"/>
  <!-- Cooktop reflective line -->
  <rect x="1362" y="437" width="136" height="4"   rx="2" fill="#1E55C8" opacity="0.1"/>

  <!-- Burner 1 (front-left, large) -->
  <circle cx="1390" cy="476" r="20"  fill="#0D1B52" stroke="#1E3580" stroke-width="1"/>
  <circle cx="1390" cy="476" r="14"  fill="#111B58"/>
  <circle cx="1390" cy="476" r="6"   fill="#0A1445"/>
  <!-- Burner 1 ring highlight -->
  <circle cx="1390" cy="476" r="20"  fill="none" stroke="#1E55C8" stroke-width="0.5" opacity="0.4"/>

  <!-- Burner 2 (front-right, medium) -->
  <circle cx="1468" cy="476" r="16"  fill="#0D1B52" stroke="#1E3580" stroke-width="1"/>
  <circle cx="1468" cy="476" r="10"  fill="#111B58"/>
  <circle cx="1468" cy="476" r="4"   fill="#0A1445"/>

  <!-- Burner 3 (rear-left, small) -->
  <circle cx="1385" cy="448" r="12"  fill="#0D1B52" stroke="#1E3580" stroke-width="0.8"/>
  <circle cx="1385" cy="448" r="7"   fill="#111B58"/>
  <circle cx="1385" cy="448" r="3"   fill="#0A1445"/>

  <!-- Burner 4 (rear-right, medium) -->
  <circle cx="1462" cy="448" r="14"  fill="#0D1B52" stroke="#1E3580" stroke-width="0.8"/>
  <circle cx="1462" cy="448" r="9"   fill="#111B58"/>
  <circle cx="1462" cy="448" r="4"   fill="#0A1445"/>

  <!-- Oven door -->
  <rect x="1361" y="504" width="138" height="78"  rx="4" fill="#152B6A" stroke="#2344B5" stroke-width="1"/>
  <!-- Oven door handle bar -->
  <rect x="1366" y="506" width="128" height="7"   rx="3.5" fill="#3B72E8" opacity="0.7"/>
  <!-- Oven window -->
  <rect x="1372" y="518" width="116" height="52"  rx="3" fill="#0D1B52" stroke="#1E3580" stroke-width="0.8"/>
  <rect x="1375" y="521" width="110" height="46"  rx="2" fill="#0A1445"/>
  <!-- Oven interior glow -->
  <rect x="1380" y="527" width="100" height="34"  rx="2" fill="#1E3A8A" opacity="0.08"/>

  <!-- Control knobs row at top of range -->
  <circle cx="1370" cy="440" r="6"  fill="#0D1B52" stroke="#3B72E8" stroke-width="0.8"/>
  <circle cx="1370" cy="440" r="2.5" fill="#3B72E8" opacity="0.6"/>
  <circle cx="1388" cy="440" r="5"  fill="#0D1B52" stroke="#3B72E8" stroke-width="0.8"/>
  <circle cx="1456" cy="440" r="5"  fill="#0D1B52" stroke="#3B72E8" stroke-width="0.8"/>
  <circle cx="1474" cy="440" r="6"  fill="#0D1B52" stroke="#3B72E8" stroke-width="0.8"/>
  <circle cx="1474" cy="440" r="2.5" fill="#3B72E8" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════
       STACKED BOXES / PALLET — between washer and fridge
  ════════════════════════════════════════════════════ -->
  <!-- Pallet base boards -->
  <rect x="1060" y="575" width="185" height="12" rx="2" fill="#1A2C6A" stroke="#2344B5" stroke-width="0.5"/>
  <rect x="1065" y="572" width="22"  height="15" rx="1" fill="#132060"/>
  <rect x="1100" y="572" width="22"  height="15" rx="1" fill="#132060"/>
  <rect x="1136" y="572" width="22"  height="15" rx="1" fill="#132060"/>
  <rect x="1172" y="572" width="22"  height="15" rx="1" fill="#132060"/>
  <rect x="1208" y="572" width="22"  height="15" rx="1" fill="#132060"/>

  <!-- Box A (bottom left) -->
  <rect x="1063" y="519" width="82"  height="56"  rx="3" fill="#1E3A8A" stroke="#2B4BB8" stroke-width="1"/>
  <line x1="1063" y1="547" x2="1145" y2="547" stroke="#2344B5" stroke-width="0.6"/>
  <line x1="1104" y1="519" x2="1104" y2="575" stroke="#2344B5" stroke-width="0.6"/>
  <rect x="1082" y="519" width="3"   height="56"  rx="1" fill="#3B72E8" opacity="0.4"/>
  <rect x="1063" y="538" width="82"  height="3"   rx="1" fill="#3B72E8" opacity="0.4"/>

  <!-- Box B (bottom right) -->
  <rect x="1153" y="527" width="88"  height="48"  rx="3" fill="#1A3580" stroke="#2B4BB8" stroke-width="1"/>
  <line x1="1153" y1="551" x2="1241" y2="551" stroke="#2344B5" stroke-width="0.6"/>
  <line x1="1197" y1="527" x2="1197" y2="575" stroke="#2344B5" stroke-width="0.6"/>
  <rect x="1175" y="527" width="3"   height="48"  rx="1" fill="#3B72E8" opacity="0.4"/>

  <!-- Box C (top center) -->
  <rect x="1090" y="468" width="100" height="54"  rx="3" fill="#1E2E80" stroke="#2B4BB8" stroke-width="1"/>
  <line x1="1090" y1="495" x2="1190" y2="495" stroke="#2344B5" stroke-width="0.6"/>
  <line x1="1140" y1="468" x2="1140" y2="522" stroke="#2344B5" stroke-width="0.6"/>
  <rect x="1115" y="468" width="3"   height="54"  rx="1" fill="#3B72E8" opacity="0.4"/>
  <rect x="1090" y="485" width="100" height="3"   rx="1" fill="#3B72E8" opacity="0.4"/>

  <!-- Small box top-right of stack -->
  <rect x="1168" y="487" width="60"  height="40"  rx="3" fill="#162C6E" stroke="#2B4BB8" stroke-width="1"/>
  <line x1="1168" y1="507" x2="1228" y2="507" stroke="#2344B5" stroke-width="0.5"/>
  <line x1="1198" y1="487" x2="1198" y2="527" stroke="#2344B5" stroke-width="0.5"/>

  <!-- ── MICROWAVE — on top of boxes, right ── -->
  <rect x="1145" y="439" width="88"  height="52"  rx="4" fill="#152B6A" stroke="#2B4BB8" stroke-width="1.2"/>
  <!-- Microwave door glass -->
  <rect x="1150" y="443" width="50"  height="44"  rx="3" fill="#0D1B52" stroke="#1E3580" stroke-width="0.8"/>
  <rect x="1153" y="446" width="44"  height="38"  rx="2" fill="#0A1445"/>
  <!-- Door handle -->
  <rect x="1198" y="457" width="4"   height="20"  rx="2" fill="#3B72E8" opacity="0.75"/>
  <!-- Control panel right -->
  <rect x="1205" y="448" width="24"  height="36"  rx="2" fill="#0D1B52" stroke="#2344B5" stroke-width="0.5"/>
  <rect x="1208" y="452" width="18"  height="10"  rx="1" fill="#1E3A8A" opacity="0.4"/>
  <circle cx="1214" cy="471" r="5"  fill="#0D1B52" stroke="#3B72E8" stroke-width="0.8"/>
  <circle cx="1214" cy="471" r="2.5" fill="#3B72E8" opacity="0.6"/>

  <!-- ── ACCENT / HIGHLIGHT DOTS ── -->
  <circle cx="1118" cy="258" r="3" fill="#3B72E8" opacity="0.6"/>
  <circle cx="1292" cy="258" r="3" fill="#3B72E8" opacity="0.6"/>
  <circle cx="1118" cy="586" r="3" fill="#3B72E8" opacity="0.6"/>
  <circle cx="1292" cy="586" r="3" fill="#3B72E8" opacity="0.6"/>

  <!-- ── BOTTOM GRADIENT FADE ── -->
  <rect width="1600" height="60" y="640" fill="url(#bg)" opacity="0.5"/>

  <!-- ── BOTTOM RIGHT TAGLINE HINT ── -->
  <rect x="820" y="616" width="740" height="1" rx="0.5" fill="#1E55C8" opacity="0.2"/>
</svg>
